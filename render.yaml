services:
  - type: web
    name: asatryanphoto-bot
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: python app.py
    healthCheckPath: /health
    envVars:
      - key: ENABLE_POLLING
        value: "1"
      - key: ALLOW_LOCAL_TESTING
        value: "0"
      - key: WEB_APP_URL
        value: https://asatryanphoto-bot.onrender.com/app/
      - key: DATA_DIR
        value: /tmp/asatryanphoto-data
      - key: ENABLE_SELF_KEEP_ALIVE
        value: "1"
      - key: KEEP_ALIVE_INTERVAL_SECONDS
        value: "600"
      - key: CONFIGURE_BOT_UI
        value: "1"
      - key: BOT_TOKEN
        sync: false
      - key: ADMIN_CHAT_ID
        sync: false
      - key: ADMIN_CHAT_IDS
        sync: false
